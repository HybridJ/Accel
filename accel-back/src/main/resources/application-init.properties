# DB 초기화 전용 프로필
#
# 사용 예:
#   --spring.profiles.active=init
#
# accel_schema.sql 실행 후 accel_data.sql을 실행한다.
# accel_schema.sql은 애플리케이션 테이블을 삭제 후 재생성하므로,
# 보존해야 할 데이터가 있는 DB에서는 이 프로필을 사용하지 않는다.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:accel_schema.sql
spring.sql.init.data-locations=classpath:accel_data.sql
spring.sql.init.encoding=UTF-8

# Load initial EV station/charger data when a new DB is initialized.
ev.batch.manual-run.enabled=true
ev.batch.manual-run.if-empty-only=true
