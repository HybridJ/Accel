spring.application.name=accel

spring.config.import=optional:file:.env[.properties]

# 0. JWT 인자
jwt.secret=${JWT_SECRET}
jwt.expiration=1800000
jwt.refresh-expiration=1209600000
auth.refresh-cookie.path=${REFRESH_COOKIE_PATH:/}
auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:Lax}

# 0-1. CORS 허용 오리진 (운영 도메인 포함). 콤마 구분, env(CORS_ALLOWED_ORIGINS)로 override 가능.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://accel.ai.kr,https://www.accel.ai.kr,http://localhost:5173,http://127.0.0.1:5173}

# 1. MyBatis 설정 (김준호)
# mapper xml 파일들 위치 지정
mybatis.mapper-locations=classpath:mapper/**/*.xml
# 객체 위치 지정 (하위 폴더 모두 스캔함)
mybatis.type-aliases-package=com.accel.api
# 스네이크 케이스 → 카멜 케이스 자동 변환
mybatis.configuration.map-underscore-to-camel-case=true

# 2. MySQL 접속 정보 (김준호) 
# DB 생성을 아직 안 해서 username, password, db명 등 맞춰야 할 내용들이 있음.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# 3. Swagger 설정(선택 항목) (나주원)
# Swagger UI 활성화 (기본값: true)
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html
# API 문서 경로 변경 (선택)
springdoc.api-docs.path=/v3/api-docs
# 특정 패키지 스캔
springdoc.packages-to-scan=com.accel.api

# 4. 기본 실행에서는 DB 초기화를 비활성화한다. 새 환경 초기화는 init 프로필을 사용한다.
spring.sql.init.mode=never

# 5. AI 호출 파라미터 (김준호)
spring.ai.model.chat=openai
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.model=${OPENAI_CHAT_MODEL:gpt-5-mini}
spring.ai.openai.chat.temperature=${OPENAI_CHAT_TEMPERATURE:1}
spring.ai.mcp.client.enabled=${MCP_CLIENT_ENABLED:false}
spring.ai.mcp.client.toolcallback.enabled=true

# 6. 외부 API KEY 세팅
youtube.api.key=${YOUTUBE_API_KEY}

# 6-1. Google Cloud Storage profile image upload
gcs.bucket-name=${GCS_BUCKET_NAME:}
gcs.profile-image-prefix=profile-images
gcs.article-image-prefix=article-images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# 7. Spring Batch / KEPCO 전기차 충전소 수집 설정
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# 개발/검증용 수동 실행. true로 켜면 앱 기동 직후 stationJob을 1회 실행한다.
ev.batch.manual-run.enabled=false
ev.batch.manual-run.if-empty-only=false
ev.batch.manual-run.target-date=

# KEPCO 전력데이터 개방 포털 - 전기차 충전소 운영정보 API
kepco.ev.api.url=https://bigdata.kepco.co.kr/openapi/v1/EVchargeManage.do
kepco.ev.api.key=${KEPCO_API_KEY}
kepco.ev.api.addr=

# 충전소 정보는 매일 04:00, 충전기 상태는 기본 5분 주기로 갱신한다.
ev.station.cron=0 0 4 * * *
ev.charger.status.interval-ms=300000
ev.charger.status.initial-delay-ms=15000
